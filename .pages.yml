        type: string
      - name: template
        type: string
      - name: date
        type: date
      - name: tags
        type: string
        list: true
      - name: weight
        type: number
      - name: draft
        type: boolean
      - name: body
        type: rich-text

  - name: intermediate-index
    label: Intermediate Section Index
    type: file
    path: content/intermediate/_index.md
    format: toml-frontmatter
    fields:
      - name: title
        type: string
