      - name: body
        type: rich-text

  - name: resources
    label: Resources
    type: collection
    path: content/resources
    format: toml-frontmatter
    exclude: ["_index.md"]
    fields:
      - name: title
        type: string
      - name: description
        type: string
      - name: template
        type: string
      - name: date
        type: date
      - name: tags
        type: string
        list: true
      - name: weight
        type: number
      - name: draft
        type: boolean
      - name: body
        type: rich-text

  - name: resources-index
