backend:
  name: github
  repo: rambros3d/rambrospcb
  branch: main
  base_url: https://sveltia-cms-auth.netlify.app
  client_id: Ov23liGvUI1qreqL657B

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "beginner"
    label: "Beginner Tutorials"
    folder: "content/beginner"
    create: true
    slug: "{{slug}}"
    preview_path: "beginner/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Template", name: "template", widget: "string", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Weight", name: "weight", widget: "number", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "beginner-index"
    label: "Beginner Section Index"
    files:
      - name: "beginner-index"
        label: "Beginner Section Index"
        file: "content/beginner/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "intermediate"
